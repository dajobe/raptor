# http://www.appveyor.com/docs/build-configuration

# version format
version: 1.0.{build}

# branches to build
branches:
  # whitelist
  only:
    - appveyor

# Operating system (build VM template)
#os: Windows Server 2012 R2
# Get image with cygwin
os: Unstable

# scripts that are called at very beginning, before repo cloning
init:
  - echo Building Raptor for Windows
  - git config --global core.autocrlf input

# GIT clone directory
clone_folder: c:\projects\raptor

platform: x64
configuration: Release

environment:
  CYG_ROOT: C:/cygwin
  CYG_SETUP_URL: https://cygwin.com/setup-x86_64.exe
  CYG_MIRROR: https://cygwin.mirror.constant.com
  CYG_CACHE: C:/cygwin/var/cache/setup
  DEST: "c:/projects/dest"
  CMAKE_GENERATOR_STRING: '"Visual Studio 12 Win64"'

install:
  - cmd: 'git submodule update --init --recursive'
  - ps:  echo "Installing Cygwin from $env:CYG_SETUP_URL to $env:CYG_ROOT/setup-x86_64.exe"
  - ps:  Invoke-WebRequest $env:CYG_SETUP_URL -OutFile $env:CYG_ROOT/setup-x86_64.exe
  - cmd: 'echo Installing Python 3, Bison and Flex from Cygwin'
  - cmd: '%CYG_ROOT%\setup-x86_64.exe -qnNdO -R "%CYG_ROOT%" -s "%CYG_MIRROR%" -l "%CYG_CACHE%" -P python3 -P bison -P flex'
  - cmd: 'echo Check Cygwin setup'
  - cmd: '%CYG_ROOT%/bin/bash -lc "cygcheck -dc cygwin"'
  - cmd: 'echo Done setting up Cygwin'
  - cmd: '%CYG_ROOT%/bin/flex -V'
  - cmd: '%CYG_ROOT%/bin/bison --version'
  - cmd: '%CYG_ROOT%/bin/python3 --version'

before_build:
  - cmd: 'md c:\projects\dest'
  - cmd: 'md c:\projects\raptor\bld'
  - cmd: 'md c:\projects\raptor\bldstatic'

# custom build script
build_script:
  - cmd: 'cd c:\projects\raptor\bldstatic'
  - cmd: 'cmake -G %CMAKE_GENERATOR_STRING% -DBISON_EXECUTABLE=%CYG_ROOT%/bin/bison -DFLEX_EXECUTABLE=%CYG_ROOT%/bin/flex -DPython3_EXECUTABLE=%CYG_ROOT%/bin/python3 -DCMAKE_INSTALL_PREFIX=%DEST%static ..'
  - cmd: 'cmake --build . --config Release --target INSTALL'
  - cmd: 'cd %DEST%static'
  - cmd: 'dir /s'
  - cmd: 'cd c:\projects\raptor\bld'
  - cmd: 'cmake -G %CMAKE_GENERATOR_STRING% -DBISON_EXECUTABLE=%CYG_ROOT%/bin/bison -DFLEX_EXECUTABLE=%CYG_ROOT%/bin/flex -DPython3_EXECUTABLE=%CYG_ROOT%/bin/python3 -DBUILD_SHARED_LIBS:BOOL=ON -DCMAKE_INSTALL_PREFIX=%DEST% ..'
  - cmd: 'cmake --build . --config Release --target INSTALL'
  - cmd: 'cd %DEST%'
  - cmd: 'dir /s'
